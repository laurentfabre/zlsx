name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VER=0.15.2
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   T=x86_64-linux  ;;
            Linux-ARM64) T=aarch64-linux ;;
            macOS-X64)   T=x86_64-macos  ;;
            macOS-ARM64) T=aarch64-macos ;;
            *) echo "unsupported runner: ${{ runner.os }}-${{ runner.arch }}" >&2; exit 1 ;;
          esac
          curl -fsSL "https://ziglang.org/download/${ZIG_VER}/zig-${T}-${ZIG_VER}.tar.xz" | tar -xJ
          echo "$PWD/zig-${T}-${ZIG_VER}" >> "$GITHUB_PATH"

      - name: zig fmt --check
        run: zig fmt --check src/ tests/ build.zig

      - name: Build (Debug)
        run: zig build

      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Unit + fuzz-smoke tests
        run: zig build test

      - name: Fetch corpus + integration tests
        run: |
          bash scripts/fetch_test_corpus.sh
          zig build test-corpus

      - name: Single-threaded build compiles
        run: zig build -Doptimize=ReleaseFast -Dsingle-threaded=true

  cross-compile:
    name: cross / ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-musl
          - aarch64-linux-musl
          - x86_64-windows-gnu
          - aarch64-macos
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" | tar -xJ
          echo "$PWD/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"
      - name: Cross-compile
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}
