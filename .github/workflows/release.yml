name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    # `zig_target` is what Zig's build system accepts (`aarch64-macos`,
    # not the LLVM triple `aarch64-apple-darwin`). `triple` is the
    # conventional name used in the release archive so humans recognise
    # the binary. They differ only on macOS.
    # `dylib_dir` is `bin` on Windows (DLLs are "runtime" artefacts there)
    # and `lib` everywhere else.
    strategy:
      fail-fast: false
      matrix:
        include:
          - zig_target: aarch64-macos
            triple: aarch64-apple-darwin
            archive_format: tar.gz
            cli_name: zlsx
            dylib_name: libzlsx.dylib
            dylib_dir: lib
            staticlib_name: libzlsx.a
          - zig_target: x86_64-macos
            triple: x86_64-apple-darwin
            archive_format: tar.gz
            cli_name: zlsx
            dylib_name: libzlsx.dylib
            dylib_dir: lib
            staticlib_name: libzlsx.a
          - zig_target: x86_64-linux-musl
            triple: x86_64-linux-musl
            archive_format: tar.gz
            cli_name: zlsx
            dylib_name: libzlsx.so
            dylib_dir: lib
            staticlib_name: libzlsx.a
          - zig_target: aarch64-linux-musl
            triple: aarch64-linux-musl
            archive_format: tar.gz
            cli_name: zlsx
            dylib_name: libzlsx.so
            dylib_dir: lib
            staticlib_name: libzlsx.a
          - zig_target: x86_64-windows-gnu
            triple: x86_64-windows-gnu
            archive_format: zip
            cli_name: zlsx.exe
            dylib_name: zlsx.dll
            dylib_dir: bin
            staticlib_name: zlsx_static.lib
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v1
        with:
          version: "0.15.2"

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }}

      - name: Stage archive contents
        run: |
          STAGE="zlsx-${{ steps.ver.outputs.version }}-${{ matrix.triple }}"
          mkdir -p "$STAGE/bin" "$STAGE/lib" "$STAGE/include"
          cp "zig-out/bin/${{ matrix.cli_name }}" "$STAGE/bin/"
          # Zig installs the shared library in `bin/` on Windows (DLLs are
          # runtime artefacts) and in `lib/` elsewhere. The import lib
          # (.lib) stays in `lib/` on Windows.
          cp "zig-out/${{ matrix.dylib_dir }}/${{ matrix.dylib_name }}" "$STAGE/lib/"
          cp "zig-out/lib/${{ matrix.staticlib_name }}" "$STAGE/lib/"
          if [ -f "zig-out/lib/zlsx.lib" ]; then cp zig-out/lib/zlsx.lib "$STAGE/lib/"; fi
          cp include/zlsx.h "$STAGE/include/"
          cp README.md LICENSE "$STAGE/"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Create tar.gz archive
        if: matrix.archive_format == 'tar.gz'
        run: tar -czf "${STAGE}.tar.gz" "$STAGE"

      - name: Create zip archive
        if: matrix.archive_format == 'zip'
        run: zip -r "${STAGE}.zip" "$STAGE"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zlsx-${{ steps.ver.outputs.version }}-${{ matrix.triple }}.${{ matrix.archive_format }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}

  checksums:
    name: checksums
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        run: |
          mkdir -p dist
          gh release download "v${{ steps.ver.outputs.version }}" --dir dist --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Produce SHA256SUMS
        run: |
          cd dist
          sha256sum zlsx-*.* > SHA256SUMS

      - name: Upload SHA256SUMS
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SHA256SUMS
          fail_on_unmatched_files: true
